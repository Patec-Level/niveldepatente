<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PATEC — Admin Firebase</title>
<style>
body{font-family:Arial,sans-serif;padding:2rem;background:#f0f4f8;color:#1a1a2e}
h2{color:#0D2347;margin-bottom:1rem}
.card{background:#fff;border-radius:10px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,.08)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#0D2347;color:#fff;padding:8px 12px;text-align:left}
td{padding:7px 12px;border-bottom:1px solid #eee}
tr:hover td{background:#f5f8ff}
.btn-del{background:#D94040;color:#fff;border:none;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px}
.btn-del:hover{background:#b83232}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.ok{background:#e6f7f1;color:#0E9E6A}
.warn{background:#fdeaea;color:#D94040}
#log{background:#1a1a2e;color:#a8ff78;padding:1rem;border-radius:8px;font-family:monospace;font-size:12px;min-height:80px;white-space:pre-wrap;margin-top:1rem}
button.primary{background:#0D2347;color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
button.primary:hover{background:#1A4A8A}
</style>
</head>
<body>
<h2>🔧 PATEC — Inspeção Firebase: hoje (27/05/2026)</h2>

<div class="card">
  <b>Coleções inspecionadas:</b> <code>producao</code> (registros do dia) e <code>pcp_diario</code> (doc 20260527)<br>
  <small style="color:#888">Conectando ao projeto <b>patec-dashboard</b>…</small>
</div>

<div class="card" id="card-producao">
  <h3>📋 Registros de Produção — 27/05/2026</h3>
  <div id="prod-content">Carregando…</div>
</div>

<div class="card" id="card-pcp">
  <h3>📊 PCP Diário — doc: 20260527</h3>
  <div id="pcp-content">Carregando…</div>
</div>

<div id="log">// Log de ações aparece aqui</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAv819h_jLOHzaWolsLVffVEW2RopzM5tE",
  authDomain: "patec-dashboard.firebaseapp.com",
  projectId: "patec-dashboard",
};

const TODAY = '2026-05-27';
let db;

function log(msg){ document.getElementById('log').textContent += '\n' + msg; }

async function init(){
  try {
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    log('✓ Firebase conectado: patec-dashboard');
    await carregarProducao();
    await carregarPCP();
  } catch(e){
    log('✗ Erro ao conectar: ' + e.message);
  }
}

async function carregarProducao(){
  const el = document.getElementById('prod-content');
  try {
    const snap = await db.collection('producao').where('data','==',TODAY).get();
    if(snap.empty){
      el.innerHTML = '<span class="badge ok">Nenhum registro encontrado para 27/05</span>';
      log('producao: nenhum doc com data=2026-05-27');
      return;
    }
    let html = '<table><tr><th>Doc ID</th><th>Colab</th><th>Data</th><th>Presença</th><th>Total itens</th><th>Ação</th></tr>';
    snap.forEach(doc => {
      const d = doc.data();
      const f = d.f || [];
      const total = f.reduce((s,v)=>s+(v||0),0);
      log('producao doc: ' + doc.id + ' | colab=' + d.colab + ' | total=' + total);
      html += `<tr>
        <td><code>${doc.id}</code></td>
        <td><b>${d.colab||'—'}</b></td>
        <td>${d.data||'—'}</td>
        <td>${d.pres||'—'}</td>
        <td><span class="badge ${total>0?'warn':'ok'}">${total} itens</span></td>
        <td><button class="btn-del" onclick="deletarDoc('producao','${doc.id}')">🗑 Deletar</button></td>
      </tr>`;
    });
    html += '</table>';
    el.innerHTML = html;
  } catch(e){
    el.innerHTML = '<span class="badge warn">Erro: ' + e.message + '</span>';
    log('Erro producao: ' + e.message);
  }
}

async function carregarPCP(){
  const el = document.getElementById('pcp-content');
  try {
    const doc = await db.collection('pcp_diario').doc('20260527').get();
    if(!doc.exists){
      el.innerHTML = '<span class="badge ok">Documento 20260527 não existe no pcp_diario</span>';
      log('pcp_diario/20260527: não existe');
      return;
    }
    const d = doc.data();
    log('pcp_diario/20260527: ' + JSON.stringify(d));
    const total = (d.f1||0)+(d.f2||0)+(d.f3||0)+(d.f4||0)+(d.f5||0)+(d.f6||0);
    el.innerHTML = `
      <table>
        <tr><th>Campo</th><th>Valor</th></tr>
        <tr><td>data</td><td>${d.data||'—'}</td></tr>
        <tr><td>f1 (PATEC Fin.)</td><td>${d.f1||0}</td></tr>
        <tr><td>f2 (MDG)</td><td>${d.f2||0}</td></tr>
        <tr><td>f3 (Pedidos)</td><td>${d.f3||0}</td></tr>
        <tr><td>f4 (Devol.)</td><td>${d.f4||0}</td></tr>
        <tr><td>f5 (Repub.)</td><td>${d.f5||0}</td></tr>
        <tr><td>f6 (XGL)</td><td>${d.f6||0}</td></tr>
        <tr><td><b>TOTAL</b></td><td><span class="badge ${total>0?'warn':'ok'}">${total}</span></td></tr>
      </table>
      <br><button class="btn-del" onclick="deletarDoc('pcp_diario','20260527')">🗑 Deletar pcp_diario/20260527</button>
    `;
  } catch(e){
    el.innerHTML = '<span class="badge warn">Erro: ' + e.message + '</span>';
    log('Erro pcp_diario: ' + e.message);
  }
}

async function deletarDoc(col, docId){
  if(!confirm('Deletar ' + col + '/' + docId + '?')) return;
  try {
    await db.collection(col).doc(docId).delete();
    log('✓ Deletado: ' + col + '/' + docId);
    alert('✓ Deletado com sucesso!');
    if(col==='producao') await carregarProducao();
    if(col==='pcp_diario') await carregarPCP();
  } catch(e){
    log('✗ Erro ao deletar: ' + e.message);
    alert('Erro: ' + e.message);
  }
}

window.onload = init;
</script>
</body>
</html>
